<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Free Like Sender</title>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <header>
        <h1>🔥 Free Like Sender</h1>
        <p>Professional Free Fire Like Tool</p>
    </header>

    <main>

        <div class="card">

            <h2>Send Likes</h2>

            <label>Choose Region</label>

            <select id="region">
                <option value="bd">🇧🇩 Bangladesh</option>
                <option value="ind">🇮🇳 India</option>
                <option value="br">🇧🇷 Brazil</option>
            </select>

            <label>Enter UID</label>

            <input type="number" id="uid" placeholder="Enter Free Fire UID">

            <button onclick="sendLike()">
                🚀 Send Likes
            </button>

        </div>

        <div class="result-card">

            <h2>API Response</h2>

            <pre id="result">
No Data Yet
            </pre>

        </div>

    </main>

    <footer>
        © 2026 Free Like Website | Made By Siam
    </footer>

    <div id="notification"></div>

    <script src="/static/script.js"></script>

<!-- Telegram Button -->
<a href="https://t.me/fflikemax" target="_blank" class="social-btn telegram-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
</a>

<!-- TikTok Button -->
<a href="https://www.tiktok.com/@user_siam_islam_redoy?_r=1&_t=ZS-96PQ0eNG6w1"
   target="_blank"
   class="social-btn tiktok-btn">

    <div class="tiktok-glow"></div>

    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
</a>

<style>

/* =========================
   COMMON BUTTON STYLE
========================= */
.social-btn {
    position: fixed;
    right: 25px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    overflow: hidden;
    z-index: 9999;
    transition: 0.3s ease;
}

/* ICON */
.social-btn img {
    width: 38px;
    height: 38px;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
}

/* =========================
   TELEGRAM BUTTON
========================= */
.telegram-btn {
    bottom: 115px;
    background: linear-gradient(135deg, #00bfff, #0088cc);
    box-shadow:
        0 0 20px rgba(0,136,204,0.7),
        0 10px 25px rgba(0,0,0,0.3);

    animation: float 2s ease-in-out infinite;
}

.telegram-btn:hover {
    transform: scale(1.12);
    box-shadow:
        0 0 35px rgba(0,136,204,1),
        0 15px 35px rgba(0,0,0,0.4);
}

/* =========================
   TIKTOK BUTTON
========================= */
.tiktok-btn {
    bottom: 25px;
    background: #000;
    border: 3px solid #25F4EE;

    box-shadow:
        0 0 15px rgba(37,244,238,0.8),
        0 10px 25px rgba(0,0,0,0.5);

    animation: float 2.2s ease-in-out infinite;
}

.tiktok-btn:hover {
    transform: scale(1.12) rotate(3deg);

    box-shadow:
        0 0 30px rgba(37,244,238,1),
        0 15px 35px rgba(0,0,0,0.7);
}

/* TikTok Glow */
.tiktok-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;

    background: #25F4EE;

    filter: blur(12px);

    opacity: 0.5;

    animation: pulse 2s infinite;
}

/* =========================
   FLOAT ANIMATION
========================= */
@keyframes float {

    0% {
        transform: translateY(0px);
    }

    50% {
        transform: translateY(-10px);
    }

    100% {
        transform: translateY(0px);
    }
}

/* =========================
   GLOW PULSE
========================= */
@keyframes pulse {

    0% {
        transform: scale(0.9);
        opacity: 0.4;
    }

    50% {
        transform: scale(1.1);
        opacity: 0.8;
    }

    100% {
        transform: scale(0.9);
        opacity: 0.4;
    }
}

    </style>    


</body>

</html>
